version: '3.8'

networks:
  ci-network:
    name: ci-network
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - ci-network

  telegram-bot:
    build: .
    container_name: telegram-bot
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ci-network