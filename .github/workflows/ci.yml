name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [bot, microservice]
    name: Build, Test, Coverage (${{ matrix.module }})
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode clean verify

      - name: Generate JaCoCo report
        run: mvn jacoco:report

      - name: Upload JaCoCo artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-schemasync-${{ matrix.module }}
          path: |
            ${{ matrix.module }}/target/site/jacoco/jacoco.xml
            ${{ matrix.module }}/target/site/jacoco/index.html

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ${{ matrix.module }}/target/site/jacoco/jacoco.xml
          flags: schemasync-${{ matrix.module }}
          fail_ci_if_error: false
