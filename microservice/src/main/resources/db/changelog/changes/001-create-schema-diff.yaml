databaseChangeLog:
  - changeSet:
      id: 001-create-schema-diff
      author: schemasync
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: schema_diff
      changes:
        - createTable:
            tableName: schema_diff
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: author
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: status
                  type: VARCHAR(50)
              - column:
                  name: description
                  type: VARCHAR(255)
              - column:
                  name: filter_json
                  type: TEXT
              - column:
                  name: diff_file_path
                  type: VARCHAR(255)
              - column:
                  name: error_message
                  type: TEXT
              - column:
                  name: validation_log
                  type: TEXT
              - column:
                  name: approved_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: applied_at
                  type: TIMESTAMP WITH TIME ZONE
