logging.file.name=target/test-application.log
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none
spring.liquibase.enabled=false

# Jenkins stub values for tests
jenkins.url=http://localhost:8081
jenkins.user=test-user
jenkins.token=test-token
jenkins.jobName=test-job

# Security
security.apiKey=test-api-key

# Stub DB values for test context
testdb.url=jdbc:h2:mem:testdb
testdb.username=sa
testdb.password=
proddb.url=jdbc:h2:mem:testdb
proddb.username=sa
proddb.password=
validation.url=jdbc:h2:mem:testdb
validation.username=sa
validation.password=